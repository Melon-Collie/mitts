name: Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    name: GUT Unit Tests
    uses: ./.github/workflows/test.yml

  export:
    name: Export and Release
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Export with Godot
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot-builds/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot-builds/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz"
          relative_project_path: "./"
          archive_output: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify export artifacts
        run: |
          echo "=== Archive directory contents ==="
          ls -la /home/runner/.local/share/godot/archives/ || echo "Archive directory missing!"

          shopt -s nullglob
          zips=(/home/runner/.local/share/godot/archives/*.zip)
          if [ ${#zips[@]} -eq 0 ]; then
            echo "ERROR: No zip archives produced"
            exit 1
          fi

          for zip in "${zips[@]}"; do
            size=$(stat -c%s "$zip")
            echo "$zip: ${size} bytes"
            if [ "$size" -lt 1048576 ]; then
              echo "ERROR: Archive is suspiciously small (< 1MB)"
              exit 1
            fi
            unzip -l "$zip" | grep -q "\.exe" || { echo "ERROR: No .exe found in $zip"; exit 1; }
          done
          echo "All archives look good."

      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "/home/runner/.local/share/godot/archives/*.zip"
          tag: "latest"
          name: "Latest Build"
          allowUpdates: true
          removeArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}