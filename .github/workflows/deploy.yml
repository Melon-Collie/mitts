name: Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    name: GUT Unit Tests
    uses: ./.github/workflows/test.yml

  export:
    name: Export and Release
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0  # full history so `git rev-list --count HEAD` is meaningful

      - name: Compute version
        id: version
        run: |
          COMMITS=$(git rev-list --count HEAD)
          VERSION="0.1.${COMMITS}"
          echo "Computed VERSION=${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Bake version into the exported build so the in-game update
          # checker can compare against the release name.
          sed -i "s/^const VERSION: String = \"dev\"$/const VERSION: String = \"${VERSION}\"/" Scripts/game/build_info.gd
          grep '^const VERSION:' Scripts/game/build_info.gd

      - name: Export with Godot
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot-builds/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot-builds/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz"
          relative_project_path: "./"
          archive_output: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify export artifacts
        run: |
          echo "=== Archive directory contents ==="
          ls -la /home/runner/.local/share/godot/archives/ || echo "Archive directory missing!"

          shopt -s nullglob
          zips=(/home/runner/.local/share/godot/archives/*.zip)
          if [ ${#zips[@]} -eq 0 ]; then
            echo "ERROR: No zip archives produced"
            exit 1
          fi

          for zip in "${zips[@]}"; do
            size=$(stat -c%s "$zip")
            echo "$zip: ${size} bytes"
            if [ "$size" -lt 1048576 ]; then
              echo "ERROR: Archive is suspiciously small (< 1MB)"
              exit 1
            fi
            unzip -l "$zip" | grep -qE "\.(exe|x86_64)" || { echo "ERROR: No .exe or .x86_64 found in $zip"; exit 1; }
          done
          echo "All archives look good."

      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "/home/runner/.local/share/godot/archives/*.zip"
          tag: "latest"
          name: "${{ steps.version.outputs.version }}"
          allowUpdates: true
          removeArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}