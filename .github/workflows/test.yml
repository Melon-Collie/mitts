name: Test

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_call:

jobs:
  gut:
    name: GUT Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: godot
          key: godot-4.6.2-linux-headless

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p godot
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d godot
          chmod +x godot/Godot_v4.6.2-stable_linux.x86_64

      - name: Import project
        run: |
          # First launch generates .godot/imported/ for any scene/resource
          # that tests might touch. Ignore non-zero exit; --quit sometimes
          # returns 1 even on successful import.
          ./godot/Godot_v4.6.2-stable_linux.x86_64 --headless --import --quit 2>&1 || true

      - name: Run GUT tests
        run: |
          ./godot/Godot_v4.6.2-stable_linux.x86_64 --headless -s addons/gut/gut_cmdln.gd -gexit
